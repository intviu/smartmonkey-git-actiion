# .github/workflows/pr_build.yml
name: Android PR Build


on:
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Run Gradle Build
    runs-on: ubuntu-latest
    steps:
      # 1. 检出 PR 分支的代码（关键点）
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      # 2. 设置 JDK 17 (根据你的项目需要调整版本)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 17

      # 3. 赋予 Gradlew 执行权限
      - name: Make Gradlew executable
        run: chmod +x gradlew

      # 4. 执行编译检查 (核心编译步骤)
      # 这一步会编译代码，如果报错，整个 Action 会标记为失败
      - name: Build project with Gradle
        run: ./gradlew assembleDebug

      # 5. （可选）运行单元测试
#      - name: Run tests
#        run: ./gradlew test